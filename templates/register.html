<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center" style="height:100vh;">

<div class="container">
    <div class="row justify-content-center">

        <div class="col-12 col-md-4">
            <div class="card p-4 shadow-sm">

                <h4 class="text-center mb-3">Register</h4>

                <input id="email" class="form-control mb-3" placeholder="Email">

                <input id="name" class="form-control mb-3" placeholder="Full Name">

                <input id="password" type="password" class="form-control mb-3" placeholder="Password">

                <button class="btn btn-success w-100" onclick="register()">Register</button>

                <p class="text-center mt-3 mb-0">
                    <a href="/">Already have account? Login</a>
                </p>

            </div>
        </div>

    </div>
</div>

<script>
function register() {
    fetch('/api/auth/register/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            email: document.getElementById('email').value,
            full_name: document.getElementById('name').value,
            password: document.getElementById('password').value
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.message) {
            alert("Registration successful");
            window.location.href = "/";
        } else {
            alert("Error: " + JSON.stringify(data));
        }
    });
}
</script>

</body>
</html>
